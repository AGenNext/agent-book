services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    ports:
      - "8000:8000"
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    pull_policy: always
    user: root
    restart: always
  agentbook:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8502:8502"
      - "5055:5055"
    env_file:
      - .env
    environment:
      # Database connection (override defaults in .env if needed)
      - SURREAL_URL=ws://surrealdb:8000/rpc
    volumes:
      - ./notebook_data:/app/data
    depends_on:
      - surrealdb
    restart: always
    
